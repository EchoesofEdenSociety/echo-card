<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Echo Card — Echo Society</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --surface: #111111;
    --surface-2: #1a1a1a;
    --border: #222222;
    --text: #e8e8e8;
    --muted: #666666;
    --bronze: #c8956c;
    --bronze-dim: #8a5a3a;
    --bronze-glow: rgba(200, 149, 108, 0.12);
    --silver: #9eaab8;
    --silver-dim: #5a6872;
    --silver-glow: rgba(158, 170, 184, 0.12);
    --gold: #d4a832;
    --gold-dim: #8a6a18;
    --gold-glow: rgba(212, 168, 50, 0.12);
  }

  body {
    background: var(--black);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }

  /* LOGIN */
  #login-view {
    width: 100%;
    max-width: 380px;
  }

  .login-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .brand-mark {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .login-title {
    font-size: 22px;
    font-weight: 300;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .login-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
    font-weight: 300;
  }

  .login-form {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .field-label {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    outline: none;
    transition: border-color 0.2s;
    border-radius: 2px;
  }

  .field-input:focus {
    border-color: #444;
  }

  .field-input::placeholder {
    color: #333;
  }

  .login-btn {
    width: 100%;
    background: var(--text);
    color: var(--black);
    border: none;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 15px;
    cursor: pointer;
    transition: opacity 0.2s;
    margin-top: 8px;
    border-radius: 2px;
  }

  .login-btn:hover { opacity: 0.85; }
  .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error-msg {
    font-size: 12px;
    color: #e05a5a;
    text-align: center;
    padding: 10px;
    background: rgba(224, 90, 90, 0.08);
    border: 1px solid rgba(224, 90, 90, 0.2);
    border-radius: 2px;
    display: none;
  }

  .error-msg.visible { display: block; }

  /* CARD VIEW */
  #card-view {
    display: none;
    width: 100%;
    max-width: 420px;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  #card-view.visible { display: flex; }

  .card-wrap {
    width: 100%;
    position: relative;
  }

  .echo-card {
    width: 100%;
    aspect-ratio: 1.586 / 1;
    background: var(--surface);
    border-radius: 12px;
    padding: 28px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border: 1px solid var(--border);
  }

  /* Tier glow */
  .echo-card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    opacity: 0;
    transition: opacity 0.6s;
  }

  .echo-card.bronze::before { background: radial-gradient(ellipse at 80% 20%, var(--bronze-glow) 0%, transparent 60%); opacity: 1; }
  .echo-card.silver::before { background: radial-gradient(ellipse at 80% 20%, var(--silver-glow) 0%, transparent 60%); opacity: 1; }
  .echo-card.gold::before   { background: radial-gradient(ellipse at 80% 20%, var(--gold-glow)   0%, transparent 60%); opacity: 1; }

  /* Tier border accent */
  .echo-card.bronze { border-color: var(--bronze-dim); }
  .echo-card.silver { border-color: var(--silver-dim); }
  .echo-card.gold   { border-color: var(--gold-dim); }

  /* Subtle texture lines */
  .echo-card::after {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 45%;
    height: 100%;
    background: repeating-linear-gradient(
      -55deg,
      transparent,
      transparent 18px,
      rgba(255,255,255,0.012) 18px,
      rgba(255,255,255,0.012) 19px
    );
    pointer-events: none;
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .card-brand {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 1.6;
  }

  .tier-badge {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 2px;
  }

  .echo-card.bronze .tier-badge { color: var(--bronze); border: 1px solid var(--bronze-dim); }
  .echo-card.silver .tier-badge { color: var(--silver); border: 1px solid var(--silver-dim); }
  .echo-card.gold   .tier-badge { color: var(--gold);   border: 1px solid var(--gold-dim); }

  .card-middle {
    position: relative;
    z-index: 1;
  }

  .member-name {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text);
    line-height: 1.2;
  }

  .member-id {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0.1em;
  }

  .card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 1;
  }

  .card-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .stat-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .stat-value {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .echo-card.bronze .stat-value.accent { color: var(--bronze); }
  .echo-card.silver .stat-value.accent { color: var(--silver); }
  .echo-card.gold   .stat-value.accent { color: var(--gold); }

  .card-qr {
    width: 60px;
    height: 60px;
    background: var(--surface-2);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .card-qr img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .qr-placeholder {
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 2px;
    padding: 6px;
  }

  .qr-dot {
    border-radius: 1px;
    background: var(--muted);
    opacity: 0.4;
  }

  /* Below card info */
  .card-meta {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  .meta-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .meta-value {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 0.02em;
  }

  .signout-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 12px;
    cursor: pointer;
    width: 100%;
    transition: color 0.2s, border-color 0.2s;
    border-radius: 2px;
  }

  .signout-btn:hover { color: var(--text); border-color: #444; }

  /* Loading */
  .loading-dots {
    display: inline-flex;
    gap: 4px;
  }

  .loading-dots span {
    width: 4px;
    height: 4px;
    background: var(--muted);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .tagline {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.25em;
    color: #333;
    text-transform: uppercase;
    text-align: center;
    margin-top: 4px;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-view">
  <div class="login-header">
    <div class="brand-mark">Echo Society</div>
    <div class="login-title">Your Echo Card</div>
    <div class="login-subtitle">Enter your email and PIN to access your card.</div>
  </div>

  <div class="login-form">
    <div>
      <label class="field-label" for="email-input">Email</label>
      <input class="field-input" id="email-input" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div>
      <label class="field-label" for="pin-input">PIN</label>
      <input class="field-input" id="pin-input" type="text" placeholder="6-digit PIN" maxlength="6" inputmode="numeric">
    </div>
    <div class="error-msg" id="error-msg">Incorrect email or PIN. Try again.</div>
    <button class="login-btn" id="login-btn" onclick="handleLogin()">Access Card</button>
  </div>
  <div class="tagline" style="margin-top: 32px;">Make Your Story Echo</div>
</div>

<!-- CARD -->
<div id="card-view">
  <div class="card-wrap">
    <div class="echo-card" id="echo-card">
      <div class="card-top">
        <div class="card-brand">
          Echoes of Eden<br>Echo Society
        </div>
        <div class="tier-badge" id="card-tier">Bronze</div>
      </div>

      <div class="card-middle">
        <div class="member-name" id="card-name">—</div>
        <div class="member-id" id="card-id">ECH-00000</div>
      </div>

      <div class="card-bottom">
        <div class="card-stats">
          <div class="stat-row">
            <div class="stat-label">Points</div>
            <div class="stat-value accent" id="card-points">0</div>
          </div>
          <div class="stat-row">
            <div class="stat-label">Referral</div>
            <div class="stat-value" id="card-referral">—</div>
          </div>
        </div>
        <div class="card-qr" id="card-qr">
          <!-- QR dots placeholder -->
          <div class="qr-placeholder" id="qr-dots"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="card-meta">
    <div class="meta-row">
      <span class="meta-label">Member Since</span>
      <span class="meta-value" id="meta-joined">—</span>
    </div>
    <div class="meta-row">
      <span class="meta-label">Status</span>
      <span class="meta-value" id="meta-status">Active</span>
    </div>
  </div>

  <button class="signout-btn" onclick="signOut()">Sign Out</button>
  <div class="tagline">Make Your Story Echo</div>
</div>

<script>
  // ── CONFIG ─────────────────────────────────────────────────────────────────
  // Replace with your actual Airtable details
  const AIRTABLE_API_KEY = 'pat52wzgVTqmeZgKR.5108cc9e61e25af930162b03d0b71f474221870bd61706bb7c520c16c531f638';
  const AIRTABLE_BASE_ID = 'app2CVkwjJdssVel3';
  const AIRTABLE_TABLE   = 'Members';
  // ───────────────────────────────────────────────────────────────────────────

  let memberData = null;

  // Generate QR placeholder dots
  function buildQRPlaceholder() {
    const grid = document.getElementById('qr-dots');
    for (let i = 0; i < 25; i++) {
      const d = document.createElement('div');
      d.className = 'qr-dot';
      d.style.opacity = Math.random() > 0.4 ? '0.6' : '0.15';
      grid.appendChild(d);
    }
  }
  buildQRPlaceholder();

  async function handleLogin() {
    const email = document.getElementById('email-input').value.trim().toLowerCase();
    const pin   = document.getElementById('pin-input').value.trim();
    const btn   = document.getElementById('login-btn');
    const err   = document.getElementById('error-msg');

    if (!email || !pin) return;

    err.classList.remove('visible');
    btn.disabled = true;
    btn.innerHTML = '<span class="loading-dots"><span></span><span></span><span></span></span>';

    try {
      const filterFormula = encodeURIComponent(
        `AND(LOWER({Email})="${email}", {PIN}="${pin}", {Status}="Approved")`
      );

      const res = await fetch(
        `https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${encodeURIComponent(AIRTABLE_TABLE)}?filterByFormula=${filterFormula}&maxRecords=1`,
        { headers: { Authorization: `Bearer ${AIRTABLE_API_KEY}` } }
      );

      const data = await res.json();

      if (!data.records || data.records.length === 0) {
        err.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'Access Card';
        return;
      }

      memberData = data.records[0].fields;
      renderCard(memberData);

    } catch (e) {
      err.textContent = 'Connection error. Please try again.';
      err.classList.add('visible');
      btn.disabled = false;
      btn.textContent = 'Access Card';
    }
  }

  function renderCard(f) {
    const tier = (f.Tier || 'Bronze').toLowerCase();

    // Card tier class
    const card = document.getElementById('echo-card');
    card.className = `echo-card ${tier}`;

    // Populate fields
    document.getElementById('card-name').textContent     = f.Name || '—';
    document.getElementById('card-id').textContent       = f['Echo ID'] || 'ECH-00000';
    document.getElementById('card-tier').textContent     = f.Tier || 'Bronze';
    document.getElementById('card-points').textContent   = f.Points ?? '0';
    document.getElementById('card-referral').textContent = f['Referral Code'] || '—';
    document.getElementById('meta-status').textContent   = f.Status || 'Active';

    // Join date
    if (f['Join Date']) {
      const d = new Date(f['Join Date']);
      document.getElementById('meta-joined').textContent = d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
    }

    // QR code — use QR URL from Airtable if available, else generate via API
    const qrContainer = document.getElementById('card-qr');
    const qrUrl = f['QR URL'] || `https://api.qrserver.com/v1/create-qr-code/?size=120x120&color=888888&bgcolor=1a1a1a&data=${encodeURIComponent(f['Referral Link'] || f['Echo ID'] || 'echo')}`;
    qrContainer.innerHTML = `<img src="${qrUrl}" alt="QR Code">`;

    // Show card
    document.getElementById('login-view').style.display = 'none';
    const cardView = document.getElementById('card-view');
    cardView.style.display = 'flex';
    cardView.classList.add('visible');
  }

  function signOut() {
    memberData = null;
    document.getElementById('email-input').value = '';
    document.getElementById('pin-input').value = '';
    document.getElementById('login-view').style.display = '';
    document.getElementById('card-view').style.display = 'none';
    document.getElementById('card-view').classList.remove('visible');
    document.getElementById('login-btn').disabled = false;
    document.getElementById('login-btn').textContent = 'Access Card';
  }

  // Enter key support
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
  });
</script>
</body>
</html>
